<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 490 234" width="490" height="234">

    <style>
      .card-bg { fill: #0d1117; }
      .title { font-family: SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace; font-size: 16px; font-weight: 700; fill: #58a6ff; }
      .divider { stroke: #30363d; stroke-width: 1; }
      .key { font-family: SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace; font-size: 13px; font-weight: 600; fill: #7ee787; }
      .value { font-family: SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace; font-size: 13px; fill: #c9d1d9; }
      .fade-row {
        opacity: 0;
        animation: fade-in 0.45s ease-out forwards;
      }
      @keyframes fade-in {
        from { opacity: 0; transform: translateX(-6px); }
        to   { opacity: 1; transform: translateX(0); }
      }
    </style>
<rect class="card-bg" x="0" y="0" width="490" height="234" rx="10"/>
